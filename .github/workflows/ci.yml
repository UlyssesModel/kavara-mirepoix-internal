name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — released 2026-01-09

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0 — released 2026-03-14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun x biome ci .

      - name: Type-check @mirepoix/ai
        run: bun x tsc --noEmit -p packages/ai/tsconfig.json

      - name: Type-check @mirepoix/coding
        run: bun x tsc --noEmit -p packages/coding/tsconfig.json

      - name: Type-check @mirepoix/core
        run: bun x tsc --noEmit -p packages/core/tsconfig.json

      - name: Negative type-smoke — @mirepoix/core (unknown-tag.ts must fail with expected diagnostics)
        # Runner asserts BOTH (a) tsc exits non-zero AND (b) the listed
        # diagnostic patterns appear in tsc output. A bare `! bun x tsc`
        # would accept any non-zero exit, so a smoke that stops compiling
        # for the wrong reason (renamed import, module-resolution break)
        # would falsely report the type invariant as enforced.
        # See Codex adversarial-review finding on PR #20 (2026-05-20),
        # CLAUDE.md "Hard don'ts", and scripts/check-negative-smoke.sh.
        run: |
          bash scripts/check-negative-smoke.sh \
            packages/core/type-smoke/tsconfig-negative.json \
            'unknown-tag\.ts.*TS2345' \
            'session:start--invalid' \
            "Property 'dispatchId' is missing" \
            "Property 'gateVerdict' is missing" \
            "Property 'outcome' is missing"

      - name: Smoke test — @mirepoix/ai surface
        run: |
          bun -e 'import * as ai from "./packages/ai/src/index.ts"; const keys = Object.keys(ai).sort(); const expected = ["PACKAGE_NAME","callProvider","extractJsonObjects","normalizeAssistantMessage","tryParseToolCallsFromContent"]; if (JSON.stringify(keys) !== JSON.stringify(expected)) { console.error("ai surface mismatch:", keys); process.exit(1); } console.log("ai surface OK");'

      - name: Smoke test — @mirepoix/coding surface
        run: |
          bun -e 'import * as coding from "./packages/coding/src/index.ts"; const keys = Object.keys(coding).sort(); const expected = ["DEFAULT_SYSTEM_PROMPT","PACKAGE_NAME","executeTool","tools"]; if (JSON.stringify(keys) !== JSON.stringify(expected)) { console.error("coding surface mismatch:", keys); process.exit(1); } console.log("coding surface OK");'

      - name: Smoke test — @mirepoix/core surface
        run: |
          bun -e 'import * as core from "./packages/core/src/index.ts"; const keys = Object.keys(core).sort(); const expected = ["Bus","PACKAGE_NAME","Session","createSessionLogger","run","schemaVersion"]; if (JSON.stringify(keys) !== JSON.stringify(expected)) { console.error("core surface mismatch:", keys); process.exit(1); } console.log("core surface OK");'

      - name: Smoke test — ToolContext threads from options.workingDir into executeTool (issue #14)
        run: bun packages/core/type-smoke/loop-toolcontext.ts

      - name: Smoke test — rehydration acceptance (FR-003)
        run: |
          bun -e 'import { tryParseToolCallsFromContent } from "./packages/ai/src/rehydrate.ts"; const c = tryParseToolCallsFromContent(`{"name": "write", "arguments": {"path": "/tmp/foo", "content": "bar"}}\n{"name": "read", "arguments": {"path": "/tmp/foo"}}`); if (c.length !== 2 || c[0].name !== "write" || c[1].name !== "read") { console.error("rehydration mismatch:", c); process.exit(1); } console.log("rehydration OK");'

      - name: Type-check @mirepoix/cli
        run: bun x tsc --noEmit -p packages/cli/tsconfig.json

      - name: Negative type-smoke — @mirepoix/cli (run-options-missing-wd.ts must fail with expected diagnostics)
        # Runner asserts BOTH (a) tsc exits non-zero AND (b) the listed
        # diagnostic patterns appear in tsc output. See the core-side step
        # above + Codex adversarial-review finding on PR #20 (2026-05-20).
        run: |
          bash scripts/check-negative-smoke.sh \
            packages/cli/type-smoke/tsconfig-negative.json \
            'run-options-missing-wd\.ts.*TS2345' \
            'missing the following properties.*workingDir' \
            'missing the following properties.*systemPromptFile'

      - name: Smoke test — @mirepoix/cli surface
        run: |
          bun -e 'import * as cli from "./packages/cli/src/index.ts"; const keys = Object.keys(cli).sort(); const expected = ["PACKAGE_NAME","main"]; if (JSON.stringify(keys) !== JSON.stringify(expected)) { console.error("cli surface mismatch:", keys); process.exit(1); } console.log("cli surface OK");'

      - name: Smoke test — --system-prompt-file resolves against invocation dir (issue #16)
        run: bun packages/cli/type-smoke/main-system-prompt-file-resolution.ts

      - name: Deliverable-tracking check
        run: |
          # Check ALL specs that have a `## Deliverables` section, not just the
          # lexicographically-last. Round-0 used `sort -r | head -1`, but ASCII
          # ordering puts `s` (sub-phase-*) before `i` (issue-*), silently skipping
          # issue-driven specs whose deliverables CI must enforce.
          # Loop-through-all generalizes the gate for multi-spec PRs going forward
          # — Codex adversarial-review [P2] on issue #14 PR. Per harness spec
          # NQ-2, mtime-based selection is rejected (mtimes don't survive checkout);
          # this enumerates instead.
          # Bootstrap-excludes the spec that introduced the check + non-sub-phase
          # schema docs that don't satisfy the convention's shape.
          set -e
          FAILED=0
          for SPEC in $(grep -l '^## Deliverables' specs/sub-phase-*.md specs/harness-*.md specs/issue-*.md 2>/dev/null \
              | grep -v 'sub-phase-d1-spike-retirement\|smoke-test-acceptance\|harness-deliverable-tracking'); do
            echo "Checking deliverables in: $SPEC"
            if ! bash scripts/check-deliverables.sh "$SPEC"; then
              FAILED=1
            fi
          done
          exit $FAILED
